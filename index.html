<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>乱獲記録</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="sub">SALMON RUN RECORDS</p>
      <h1>乱獲記録</h1>
    </header>

    <section class="totals">
      <div class="total-card day-card">
        <span>☀️ DAY</span>
        <strong id="totalDay"></strong>
      </div>
      <div class="total-card night-card">
        <span>🌙 NIGHT</span>
        <strong id="totalNight"></strong>
      </div>
    </section>

    <section class="section">
      <h2>ステージサマリ</h2>
      <div id="summary" class="summary-grid"></div>
    </section>

    <section class="section">
      <h2>ステージ別リザルト</h2>
      <div id="stageList" class="stage-list"></div>
    </section>
  </main>

  <button id="topBtn">↑</button>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
