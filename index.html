<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>乱獲記録</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <p class="sub">SALMON RUN RECORDS</p>
        <h1>🦑 乱獲記録</h1>
      </div>
      <p class="updated">最終更新：<span id="lastUpdated"></span></p>
    </header>

    <section class="totals">
      <div class="total-card day">
        <span>昼 ☀️</span>
        <strong id="totalDay"></strong>
        <small>TOTAL DAY</small>
      </div>
      <div class="total-card night">
        <span>夜 🌙</span>
        <strong id="totalNight"></strong>
        <small>TOTAL NIGHT</small>
      </div>
    </section>

    <section class="section">
      <h2>🦑 ステージサマリ</h2>
      <div id="summary" class="summary-grid"></div>
    </section>

    <section class="section">
      <h2>🦑 ステージ別リザルト</h2>
      <div id="stageList" class="stage-list"></div>
    </section>
  </main>

  <button id="topBtn">↑</button>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
